<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiboAnime | Anti-Block Edition</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #ff8a00; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .anime-card:hover img { transform: scale(1.05); border-color: #ff8a00; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #ff8a00; border-radius: 10px; }
    </style>
</head>
<body class="pt-20">

    <header class="fixed top-0 w-full z-[100] bg-black/90 border-b border-white/5 py-4 backdrop-blur-md">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-[#ff8a00] font-black italic text-xl uppercase tracking-tighter cursor-pointer" onclick="location.reload()">
                BIBO<span class="text-white text-sm ml-1 opacity-80">ANIME</span>
            </h1>
            <div class="text-[10px] text-white/40 uppercase font-bold tracking-widest hidden md:block italic">KZ Force Mode v3.0</div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        <div id="animeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <div class="col-span-full text-center py-20 opacity-50 uppercase text-xs tracking-[0.2em]">Подключаюсь к базе данных...</div>
        </div>
    </main>

    <div id="playerOverlay" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl" onclick="if(event.target.id === 'playerOverlay') closePlayer()">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <h3 id="pTitle" class="text-sm md:text-xl font-black uppercase text-[#ff8a00] italic truncate"></h3>
                <button onclick="closePlayer()" class="text-2xl hover:text-red-500 transition px-2">✕</button>
            </div>
            
            <div class="video-box shadow-[0_0_50px_rgba(255,138,0,0.2)]">
                <iframe id="kFrame" src="" allowfullscreen></iframe>
            </div>

            <div class="mt-8 flex flex-col gap-4">
                <div class="flex flex-wrap justify-center gap-2">
                    <button onclick="trySrv(1)" class="bg-white/5 border border-white/10 px-6 py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-[#ff8a00] hover:text-black transition">Сервер 1 (Alloha)</button>
                    <button onclick="trySrv(2)" class="bg-white/5 border border-white/10 px-6 py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-green-600 transition">Сервер 2 (Kodik)</button>
                    <button onclick="trySrv(3)" class="bg-white/5 border border-white/10 px-6 py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-blue-600 transition">Сервер 3 (Зарубежный)</button>
                </div>
                
                <button onclick="forceOpen()" class="w-full bg-[#ff8a00] text-black py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg hover:scale-[1.01] transition">
                    🚀 План Б: Не грузит? Сменить зеркало
                </button>
                
                <p class="text-[9px] text-center text-white/30 uppercase tracking-widest font-bold mt-2">
                    Важно: Если Касперский ругается — нажми "Я понимаю риск и хочу перейти"
                </p>
            </div>
        </div>
    </div>

    <script>
        let currentId = null;
        // Зеркала для Кодика, которые еще не забанены в КЗ
        const KODIK_MIRRORS = ['https://kinosky.top', 'https://db.sklad-k.com', 'https://aniqit.com'];
        let mirrorIdx = 0;

        async function load() {
            try {
                // Берем онгоинги через Шикимори API
                const r = await fetch('https://shikimori.one/api/animes?limit=24&order=popularity&kind=tv&status=ongoing');
                const data = await r.json();
                document.getElementById('animeGrid').innerHTML = data.map(a => `
                    <div onclick="openPlayer(${a.id}, '${(a.russian || a.name).replace(/'/g, "")}')" class="anime-card cursor-pointer group">
                        <div class="relative overflow-hidden rounded-2xl border-2 border-white/5 transition-all duration-300">
                            <img src="https://shikimori.one${a.image.original}" class="w-full h-[280px] object-cover transition duration-500">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <i class="fa fa-play text-[#ff8a00] text-3xl"></i>
                            </div>
                        </div>
                        <p class="text-[10px] mt-3 font-black uppercase truncate tracking-tighter opacity-70 group-hover:opacity-100 group-hover:text-[#ff8a00] transition">
                            ${a.russian || a.name}
                        </p>
                    </div>
                `).join('');
            } catch(e) { 
                document.getElementById('animeGrid').innerHTML = '<p class="col-span-full text-center">Ошибка загрузки данных.</p>';
            }
        }

        function openPlayer(id, title) {
            currentId = id;
            document.getElementById('pTitle').innerText = title;
            document.getElementById('playerOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            trySrv(1); // По умолчанию стартуем с Alloha
        }

        function trySrv(n) {
            const f = document.getElementById('kFrame');
            f.src = 'about:blank'; 
            
            setTimeout(() => {
                if(n === 1) f.src = `https://api.alloha.tv/player?shikimori=${currentId}`;
                if(n === 2) f.src = `${KODIK_MIRRORS[mirrorIdx]}/find?shikimoriID=${currentId}`;
                if(n === 3) f.src = `https://vidsrc.me/embed/anime?shikimori=${currentId}`;
            }, 100);
        }

        function forceOpen() {
            // Переключаем зеркало по кругу
            mirrorIdx = (mirrorIdx + 1) % KODIK_MIRRORS.length;
            trySrv(2);
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.add('hidden');
            document.getElementById('kFrame').src = '';
            document.body.style.overflow = 'auto';
        }

        load();
    </script>
</body>
</html>
