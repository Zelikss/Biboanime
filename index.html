<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiboAnime | Premium Edition</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .anime-card { transition: all 0.3s ease; }
        .anime-card:hover { transform: translateY(-8px); }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #ff8a00; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .hidden { display: none !important; }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ff8a00; border-radius: 10px; }
        .genre-btn { white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; background: rgba(255,255,255,0.03); }
        .genre-btn:hover, .genre-btn.active { background: #ff8a00; color: black; border-color: #ff8a00; }
    </style>
</head>
<body class="pt-24">

    <header class="fixed top-0 w-full z-[100] bg-black/95 border-b border-white/5 py-4 backdrop-blur-md">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-[#ff8a00] font-black italic text-2xl tracking-tighter cursor-pointer" onclick="location.reload()">
                BIBO<span class="text-white text-sm ml-1 opacity-80 uppercase">Anime</span>
            </h1>
            <button onclick="showFavs()" class="text-[10px] font-black uppercase hover:text-[#ff8a00] transition bg-white/5 px-3 py-2 rounded-lg border border-white/10">
                <i class="fa fa-heart text-red-500 mr-1"></i> Избранное
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4">
        
        <section class="mb-10">
            <h2 class="text-[#ff8a00] font-black uppercase italic mb-4 flex items-center gap-2 text-sm">
                <span class="bg-[#ff8a00] text-black px-2 py-0.5 rounded italic">TOP 10</span> Популярное
            </h2>
            <div id="top10" class="flex gap-4 overflow-x-auto pb-4 custom-scroll"></div>
        </section>

        <section class="mb-8 overflow-hidden">
            <div class="flex gap-2 overflow-x-auto pb-2 custom-scroll" id="genreList">
                <button class="genre-btn active px-5 py-2 rounded-xl text-[10px] font-bold uppercase" onclick="loadAnimes('all', this)">Все</button>
                <button class="genre-btn px-5 py-2 rounded-xl text-[10px] font-bold uppercase" onclick="loadAnimes(27, this)">Сёнен</button>
                <button class="genre-btn px-5 py-2 rounded-xl text-[10px] font-bold uppercase" onclick="loadAnimes(10, this)">Фэнтези</button>
                <button class="genre-btn px-5 py-2 rounded-xl text-[10px] font-bold uppercase" onclick="loadAnimes(4, this)">Комедия</button>
                <button class="genre-btn px-5 py-2 rounded-xl text-[10px] font-bold uppercase" onclick="loadAnimes(1, this)">Экшен</button>
            </div>
        </section>

        <div id="mainGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <div class="col-span-full text-center py-20 opacity-30 uppercase text-[10px] tracking-widest">Загрузка данных...</div>
        </div>

    </main>

    <footer class="mt-20 border-t border-white/5 bg-black/50 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="text-[#ff8a00] font-black italic text-xl mb-6 uppercase">BiboAnime Group</div>
            <div class="flex justify-center gap-6 text-[10px] uppercase font-bold opacity-50 mb-8 tracking-widest">
                <a href="#" class="hover:text-[#ff8a00]">Telegram</a>
                <a href="#" class="hover:text-[#ff8a00]">Discord</a>
                <a href="#" class="hover:text-[#ff8a00]">DMCA / Помощь</a>
            </div>
            <p class="text-[9px] text-red-500 uppercase font-bold max-w-xl mx-auto opacity-60 leading-relaxed">
                Если плееры выдают 404 или ошибку IP — смените DNS на 8.8.8.8 в настройках вашего устройства.
            </p>
        </div>
    </footer>

    <div id="playerOverlay" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl" onclick="if(event.target.id === 'playerOverlay') closePlayer()">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <h3 id="pTitle" class="text-xs md:text-lg font-black uppercase text-[#ff8a00] italic truncate mr-4"></h3>
                <div class="flex gap-4 items-center">
                    <button id="favBtn" onclick="toggleFav()" class="text-xl hover:scale-110 transition"><i class="fa-regular fa-heart"></i></button>
                    <button onclick="closePlayer()" class="text-2xl hover:text-red-500 transition px-2">✕</button>
                </div>
            </div>
            <div class="video-box shadow-2xl shadow-orange-500/10">
                <iframe id="kFrame" src="" allowfullscreen></iframe>
            </div>
            <div class="mt-6 flex flex-wrap justify-center gap-2">
                <button onclick="trySrv(1)" class="bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 transition">Сервер 1 (Alloha)</button>
                <button onclick="trySrv(2)" class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-white/10 transition">Сервер 2 (Kodik)</button>
                <button onclick="trySrv(3)" class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-white/10 transition">Сервер 3 (Зарубежный)</button>
                <button onclick="forceOpen()" class="bg-[#ff8a00] text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg">Сменить зеркало</button>
            </div>
        </div>
    </div>

    <script>
        let curAnime = null;
        let favorites = JSON.parse(localStorage.getItem('biboFavs')) || [];
        const KODIK_MIRRORS = ['https://kinosky.top', 'https://db.sklad-k.com', 'https://aniqit.com'];
        let mirrorIdx = 0;

        async function loadAnimes(genreId = 'all', btn = null) {
            if(btn) {
                document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 text-[10px] uppercase tracking-widest">Загрузка...</div>';
            
            try {
                let url = 'https://shikimori.one/api/animes?limit=24&order=popularity&kind=tv&status=ongoing';
                if(genreId !== 'all') url += `&genre=${genreId}`;
                
                const r = await fetch(url);
                const data = await r.json();
                grid.innerHTML = data.map(a => renderCard(a)).join('');
                
                if(genreId === 'all') {
                    document.getElementById('top10').innerHTML = data.slice(0, 10).map((a, i) => `
                        <div onclick="openPlayer(${a.id}, '${(a.russian || a.name).replace(/'/g, "")}')" class="flex-shrink-0 w-36 cursor-pointer group">
                            <div class="relative rounded-2xl overflow-hidden h-48 border-2 border-white/5 group-hover:border-[#ff8a00] transition-all">
                                <img src="https://shikimori.one${a.image.original}" class="w-full h-full object-cover">
                                <div class="absolute bottom-0 right-0 bg-[#ff8a00] text-black text-xl font-black px-2 italic shadow-2xl">#${i+1}</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) { grid.innerHTML = 'Ошибка загрузки аниме.'; }
        }

        function renderCard(a) {
            return `
                <div onclick="openPlayer(${a.id}, '${(a.russian || a.name).replace(/'/g, "")}')" class="anime-card cursor-pointer group">
                    <div class="relative overflow-hidden rounded-2xl border-2 border-white/5 transition-all duration-300">
                        <img src="https://shikimori.one${a.image.original}" class="w-full h-[260px] object-cover transition duration-500">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <i class="fa fa-play text-[#ff8a00] text-3xl"></i>
                        </div>
                    </div>
                    <p class="text-[10px] mt-3 font-bold uppercase truncate opacity-70 group-hover:text-[#ff8a00] tracking-tighter">${a.russian || a.name}</p>
                </div>
            `;
        }

        function openPlayer(id, title) {
            curAnime = { id, title };
            document.getElementById('pTitle').innerText = title;
            document.getElementById('playerOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updateFavIcon();
            trySrv(1);
        }

        function trySrv(n) {
            const f = document.getElementById('kFrame');
            f.src = 'about:blank';
            setTimeout(() => {
                if(n === 1) f.src = `https://api.alloha.tv/player?shikimori=${curAnime.id}`;
                if(n === 2) f.src = `${KODIK_MIRRORS[mirrorIdx]}/find?shikimoriID=${curAnime.id}`;
                if(n === 3) f.src = `https://vidsrc.me/embed/anime?shikimori=${curAnime.id}`;
            }, 100);
        }

        function forceOpen() {
            mirrorIdx = (mirrorIdx + 1) % KODIK_MIRRORS.length;
            trySrv(2);
        }

        function toggleFav() {
            const idx = favorites.findIndex(f => f.id === curAnime.id);
            if(idx > -1) favorites.splice(idx, 1);
            else favorites.push(curAnime);
            localStorage.setItem('biboFavs', JSON.stringify(favorites));
            updateFavIcon();
        }

        function updateFavIcon() {
            const isFav = favorites.some(f => f.id === curAnime.id);
            document.getElementById('favBtn').innerHTML = isFav ? '<i class="fa-solid fa-heart text-red-500 scale-125"></i>' : '<i class="fa-regular fa-heart"></i>';
        }

        async function showFavs() {
            const grid = document.getElementById('mainGrid');
            if(favorites.length === 0) { alert("Список избранного пуст!"); return; }
            grid.innerHTML = '<h2 class="col-span-full text-[#ff8a00] font-black uppercase italic text-xl mb-4">Ваша коллекция</h2>';
            for(let fav of favorites) {
                try {
                    const r = await fetch(`https://shikimori.one/api/animes/${fav.id}`);
                    const data = await r.json();
                    grid.innerHTML += renderCard(data);
                } catch(e) {}
            }
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.add('hidden');
            document.getElementById('kFrame').src = '';
            document.body.style.overflow = 'auto';
        }

        loadAnimes();
    </script>
</body>
</html>
